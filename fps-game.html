<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Black Vortex FPS</title>

<style>
body { margin: 0; overflow: hidden; background: black; font-family: Arial, sans-serif; }

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-weight: bold;
  text-shadow: 0 0 10px #00ff00;
  z-index: 100;
}

#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
  box-shadow: 0 0 10px white;
  pointer-events: none;
}

#instructions {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  z-index: 200;
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border-radius: 10px;
}

canvas { display: block; }
</style>
</head>

<body>

<div id="hud">
  Score: <span id="score">0</span> | Enemies: <span id="enemy-count">5</span>
</div>
<div id="crosshair"></div>
<div id="instructions">
  <h2>Black Vortex FPS</h2>
  <p>Click to play<br>Mouse: Look around<br>Click: Shoot</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 50);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// LIGHT
const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(5,10,5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// FLOOR
const floorGeometry = new THREE.PlaneGeometry(100,100);
const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// PLAYER
camera.position.set(0, 1.6, 0);

// WASD Movement
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);
const speed = 0.1;
const velocity = new THREE.Vector3();

// CONTROLS (mouse look)
let yaw = 0;
let pitch = 0;
document.addEventListener("mousemove", e => {
  if (document.pointerLockElement === document.body) {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    camera.rotation.order = 'YXZ';
    camera.rotation.set(pitch, yaw, 0);
  }
});

// CLICK TO LOCK MOUSE + HIDE INSTRUCTIONS
document.body.addEventListener("click", () => {
  document.body.requestPointerLock();
  document.getElementById('instructions').style.display = 'none';
});

// ENEMY
let enemies = [];
function spawnEnemy() {
  const enemyGeometry = new THREE.BoxGeometry(1,2,1);
  const enemyMaterial = new THREE.MeshStandardMaterial({ 
    color: 0xff4444,
    emissive: 0x440000 
  });
  const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
  
  enemy.position.set(
    (Math.random()-0.5)*40,
    1,
    (Math.random()-0.5)*40
  );
  enemy.castShadow = true;
  
  scene.add(enemy);
  enemies.push(enemy);
  updateEnemyCount();
}

// SPAWN INITIAL ENEMIES
for(let i=0; i<8; i++) spawnEnemy();

// UI Updates
function updateEnemyCount() {
  document.getElementById('enemy-count').innerText = enemies.length;
}

// SHOOTING
let score = 0;
document.addEventListener("click", () => {
  if (document.pointerLockElement !== document.body) return;
  
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  
  const hits = raycaster.intersectObjects(enemies);
  
  if (hits.length > 0) {
    const enemy = hits[0].object;
    scene.remove(enemy);
    enemies = enemies.filter(e => e !== enemy);
    
    // Score effect
    score += 100;
    document.getElementById("score").innerText = score;
    updateEnemyCount();
    
    // Respawn
    spawnEnemy();
  }
});

// ENEMY AI (move toward player + rotate)
function updateEnemies() {
  enemies.forEach(enemy => {
    const dir = new THREE.Vector3();
    dir.subVectors(camera.position, enemy.position).normalize();
    
    // Move toward player
    enemy.position.add(dir.multiplyScalar(0.015));
    
    // Look at player
    enemy.lookAt(camera.position);
    
    // Remove if too close
    if (enemy.position.distanceTo(camera.position) < 1.5) {
      scene.remove(enemy);
      enemies = enemies.filter(e => e !== enemy);
      spawnEnemy();
    }
  });
}

// LOOP
function animate() {
  requestAnimationFrame(animate);
  
  // Movement
  const direction = new THREE.Vector3();
  if (keys['KeyW']) direction.z -= 1;
  if (keys['KeyS']) direction.z += 1;
  if (keys['KeyA']) direction.x -= 1;
  if (keys['KeyD']) direction.x += 1;
  direction.normalize();
  direction.applyEuler(camera.rotation);
  camera.position.add(direction.multiplyScalar(speed));
  
  updateEnemies();
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
