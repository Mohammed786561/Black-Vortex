<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Vortex Admin Panel - Working Version</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
            font-size: 24px;
            font-weight: bold;
        }
        
        .login-box {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #e94560;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 5px;
            background: #0f0f1a;
            color: white;
            font-size: 16px;
        }
        
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        
        button:hover {
            background: #ff0043;
        }
        
        .error {
            color: #ff0043;
            margin-top: 10px;
            display: none;
        }
        
        .dashboard {
            display: none;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #00b894;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            color: #00b894;
            font-weight: bold;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #333;
            color: #e94560;
        }
        
        .users-table td {
            padding: 15px;
            border-bottom: 1px solid #333;
        }
        
        .logout-btn {
            background: #636e72;
            margin-top: 20px;
        }
        
        .demo-notice {
            background: #fdcb6e;
            color: #2d3436;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🔒 BLACK VORTEX ADMIN PANEL</div>
        
        <div class="login-box">
            <div class="demo-notice">
                🚨 WORKING VERSION - NO SERVER NEEDED
            </div>
            
            <div class="input-group">
                <input type="email" id="admin-email" placeholder="Admin Email">
            </div>
            
            <div class="input-group">
                <input type="password" id="admin-password" placeholder="Admin Password">
            </div>
            
            <button onclick="adminLogin()">LOGIN AS ADMIN</button>
            
            <div id="error-msg" class="error">Invalid admin credentials</div>
            
            <div style="margin-top: 20px; padding: 15px; background: #0f0f1a; border-radius: 5px; border: 1px solid #333;">
                <h4 style="margin: 0 0 10px 0; color: #e94560;">Admin Credentials:</h4>
                <p style="margin: 0; font-size: 14px;">Email: <strong>admin@blackvortex.com</strong></p>
                <p style="margin: 5px 0 0 0; font-size: 14px;">Password: <strong>admin123</strong></p>
            </div>
        </div>
        
        <div id="dashboard" class="dashboard">
            <h2 style="color: #00b894; margin-top: 0;">Admin Dashboard</h2>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="total-users">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="total-admins">0</div>
                    <div class="stat-label">Admin Users</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="total-regular">0</div>
                    <div class="stat-label">Regular Users</div>
                </div>
            </div>
            
            <div style="margin-bottom: 20px;">
                <input type="text" id="search-users" placeholder="Search users by email..." style="width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #333; border-radius: 5px; color: white;">
            </div>
            
            <div style="overflow-x: auto;">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Password</th>
                            <th>Role</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- Users will be loaded here -->
                    </tbody>
                </table>
            </div>
            
            <button class="logout-btn" onclick="logoutAdmin()">LOGOUT</button>
        </div>
    </div>

    <script>
        let isAdminLoggedIn = false;
        let users = [];

        // Initialize demo data
        function initDemoData() {
            users = [
                {
                    id: 'admin-001',
                    email: 'admin@blackvortex.com',
                    password: 'admin123',
                    role: 'admin',
                    createdAt: new Date(Date.now() - 86400000).toLocaleString()
                },
                {
                    id: 'user-001',
                    email: 'john.doe@gmail.com',
                    password: 'password123',
                    role: 'user',
                    createdAt: new Date(Date.now() - 172800000).toLocaleString()
                },
                {
                    id: 'user-002',
                    email: 'jane.smith@gmail.com',
                    password: 'mypassword',
                    role: 'user',
                    createdAt: new Date(Date.now() - 259200000).toLocaleString()
                },
                {
                    id: 'user-003',
                    email: 'bob.wilson@gmail.com',
                    password: 'secret123',
                    role: 'user',
                    createdAt: new Date(Date.now() - 345600000).toLocaleString()
                }
            ];
        }

        // Admin Login
        function adminLogin() {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const errorMsg = document.getElementById('error-msg');

            // Admin credentials
            if (email === 'admin@blackvortex.com' && password === 'admin123') {
                isAdminLoggedIn = true;
                initDemoData();
                document.querySelector('.login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadUsers();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // Admin Logout
        function logoutAdmin() {
            isAdminLoggedIn = false;
            document.querySelector('.login-box').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('admin-email').value = '';
            document.getElementById('admin-password').value = '';
            document.getElementById('error-msg').style.display = 'none';
        }

        // Load Users
        function loadUsers() {
            if (!isAdminLoggedIn) return;

            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';

            if (users && users.length > 0) {
                users.forEach(user => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-family: monospace;">${user.id}</td>
                        <td>${user.email}</td>
                        <td style="font-family: monospace; color: #e94560;">${user.password}</td>
                        <td><span style="background: ${user.role === 'admin' ? '#e94560' : '#00b894'}; color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px;">${user.role}</span></td>
                        <td>${user.createdAt}</td>
                        <td>
                            ${user.role !== 'admin' ? `<button style="background: #d63031; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;" onclick="deleteUser('${user.id}')">Delete</button>` : '<span style="color: #888; font-size: 12px;">Protected</span>'}
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                // Update stats
                document.getElementById('total-users').textContent = users.length;
                document.getElementById('total-admins').textContent = users.filter(u => u.role === 'admin').length;
                document.getElementById('total-regular').textContent = users.filter(u => u.role !== 'admin').length;
            }
        }

        // Delete User
        function deleteUser(userId) {
            if (!isAdminLoggedIn) return;

            if (!confirm('Are you sure you want to delete this user?')) {
                return;
            }

            users = users.filter(u => u.id !== userId);
            alert('User deleted successfully');
            loadUsers();
        }

        // Search Users
        document.getElementById('search-users').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#users-table-body tr');
            
            rows.forEach(row => {
                const email = row.children[1].textContent.toLowerCase();
                
                if (email.includes(searchTerm)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        // Clear default credentials
        window.addEventListener('load', () => {
            document.getElementById('admin-email').value = '';
            document.getElementById('admin-password').value = '';
        });
    </script>
</body>
</html>
